        >
        <div class="hidden md:flex items-center gap-md">
          <a
            class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors"
            href="../index.html"
            >Home</a
          >
          <a
            class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors"
            href="standings.html"

          >
          <a
            class="font-label-caps text-label-caps text-primary border-b-2 border-primary pb-1"

          >
          <a

          <span class="material-symbols-outlined text-primary"

          <span>🏆</span> Bracket Knockout
        </h1>
        <p class="font-body-lg text-body-lg text-on-surface-variant">
          Perjalanan menuju juara dunia

        <div class="loading-text">
          <span class="loading-spinner spinner"></span>

        </div>
      </div>

    <footer class="bg-surface-container-lowest border-t border-white/5 mt-auto">
      <div
        class="flex flex-col md:flex-row justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-lg max-w-[1280px] mx-auto gap-md"
      >
        <div class="font-headline-md text-headline-md text-primary">

        <div class="flex gap-md flex-wrap justify-center">
          <a
            class="font-label-caps text-label-caps text-on-surface-variant hover:text-secondary transition-colors"
